<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor EAS — COMPÁS</title>
<style>
  :root {
    --azul:#0074c8; --azul2:#00acd9; --verde:#059669; --rojo:#dc143c;
    --ambar:#d97706; --gris:#64748b; --gris-claro:#f1f5f9;
    --texto:#1e293b; --borde:#e2e8f0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f8fafc; color:var(--texto); font-size:0.875rem; }

  /* HEADER */
  .header { background:linear-gradient(135deg,#0074c8 0%,#00acd9 60%,#0091d4 100%); color:white; padding:1.25rem 1.5rem; }
  .header-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:0.5rem; }
  .header h1 { font-size:1.2rem; font-weight:700; }
  .header .sub { font-size:0.8rem; opacity:0.85; margin-top:0.2rem; }
  .header-meta { font-size:0.75rem; opacity:0.75; text-align:right; }
  .badge-header { display:inline-block; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3); border-radius:12px; padding:0.2rem 0.6rem; font-size:0.7rem; font-weight:600; margin-top:0.3rem; }

  /* LAYOUT */
  .container { max-width:1100px; margin:0 auto; padding:1.25rem 1rem 2rem; }

  /* RESUMEN */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
  .summary-card { background:white; border:1px solid var(--borde); border-radius:10px; padding:0.9rem 1rem; }
  .summary-card .label { font-size:0.7rem; color:var(--gris); text-transform:uppercase; letter-spacing:0.03em; font-weight:600; }
  .summary-card .value { font-size:1.5rem; font-weight:700; color:var(--azul); margin-top:0.2rem; }
  .summary-card .value.verde { color:var(--verde); }
  .summary-card .value.rojo { color:var(--rojo); }
  .summary-card .value.ambar { color:var(--ambar); }
  .summary-card .desc { font-size:0.72rem; color:var(--gris); margin-top:0.2rem; }

  /* SEÑALES */
  .signals-card { background:white; border:1px solid var(--borde); border-radius:10px; padding:1rem 1.25rem; margin-bottom:1.5rem; }
  .signals-card h3 { font-size:0.85rem; font-weight:700; margin-bottom:0.75rem; color:var(--texto); }
  .signal-row { display:flex; align-items:center; gap:0.75rem; padding:0.45rem 0; border-bottom:1px solid var(--gris-claro); }
  .signal-row:last-child { border-bottom:none; }
  .signal-badge { min-width:44px; text-align:center; font-size:0.68rem; font-weight:700; border-radius:8px; padding:0.15rem 0.4rem; }
  .signal-badge.peor { background:#fee2e2; color:var(--rojo); }
  .signal-badge.mejor { background:#dcfce7; color:var(--verde); }
  .signal-text { flex:1; font-size:0.78rem; color:var(--texto); }
  .signal-vals { font-size:0.72rem; color:var(--gris); white-space:nowrap; }

  /* ÁREAS */
  .area-block { background:white; border:1px solid var(--borde); border-radius:10px; margin-bottom:1rem; overflow:hidden; }
  .area-header { padding:0.9rem 1.25rem; background:var(--gris-claro); border-bottom:1px solid var(--borde); display:flex; align-items:center; gap:0.6rem; cursor:pointer; user-select:none; }
  .area-header h2 { font-size:0.9rem; font-weight:700; flex:1; }
  .area-header .area-badge { font-size:0.68rem; color:var(--gris); }
  .area-toggle { font-size:0.7rem; color:var(--gris); }
  .area-content { padding:0; }

  /* GRUPOS */
  .grupo-header { padding:0.55rem 1.25rem; background:#fcfcfd; border-bottom:1px solid #f0f4f8; font-size:0.73rem; font-weight:600; color:var(--gris); text-transform:uppercase; letter-spacing:0.03em; }
  .grupo-nota { padding:0.35rem 1.25rem; background:#fffbeb; border-bottom:1px solid #fef3c7; font-size:0.71rem; color:#92400e; }

  /* FILAS INDICADOR */
  .ind-row { display:grid; grid-template-columns:1fr auto; align-items:center; gap:0.5rem; padding:0.55rem 1.25rem; border-bottom:1px solid #f8fafc; transition:background 0.1s; }
  .ind-row:hover { background:#f8fafc; }
  .ind-row:last-child { border-bottom:none; }
  .ind-left {}
  .ind-code { font-size:0.67rem; font-weight:700; color:var(--gris); text-transform:uppercase; letter-spacing:0.04em; }
  .ind-pregunta { font-size:0.79rem; color:var(--texto); margin-top:0.1rem; line-height:1.3; }
  .ind-tipo { font-size:0.64rem; color:var(--gris); margin-top:0.15rem; font-style:italic; }
  .ind-right { min-width:210px; }
  .ind-valores { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.35rem; justify-content:flex-end; }
  .ind-val-mun { font-size:0.88rem; font-weight:700; }
  .ind-val-mun.verde { color:var(--verde); }
  .ind-val-mun.rojo { color:var(--rojo); }
  .ind-val-mun.ambar { color:var(--ambar); }
  .ind-val-mun.neutro { color:var(--texto); }
  .ind-val-ref { font-size:0.7rem; color:var(--gris); }
  .ind-val-sin { font-size:0.75rem; color:#94a3b8; font-style:italic; }
  .bar-container { position:relative; height:7px; background:#e2e8f0; border-radius:4px; overflow:visible; }
  .bar-and { position:absolute; top:0; left:0; height:100%; border-radius:4px; background:#cbd5e1; transition:width 0.4s; }
  .bar-mun { position:absolute; top:-2px; height:11px; width:3px; border-radius:2px; transition:left 0.4s; }
  .bar-mun.verde { background:var(--verde); }
  .bar-mun.rojo { background:var(--rojo); }
  .bar-mun.neutro { background:var(--azul); }
  .bar-mun.ambar { background:var(--ambar); }

  /* NO DATA */
  .no-data { text-align:center; padding:3rem 2rem; color:var(--gris); }
  .no-data h2 { font-size:1.1rem; margin-bottom:0.5rem; }
  .no-data p { font-size:0.85rem; margin-bottom:1.5rem; }
  .btn-volver { background:var(--azul); color:white; border:none; border-radius:8px; padding:0.6rem 1.2rem; font-size:0.85rem; cursor:pointer; }

  /* NOTE */
  .nota-card { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.77rem; color:#1e40af; }

  @media(max-width:640px) {
    .ind-row { grid-template-columns:1fr; }
    .ind-right { min-width:auto; }
    .summary-grid { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>

        ]

      {
        nombre: 'Apoyo social funcional — Escala Duke-UNC',

        indicadores: [

        ]
      },
      {
        nombre: 'Bienestar emocional (autopercibido)',
        nota: 'Indicadores de bienestar subjetivo. No sustituyen evaluación clínica.',
        indicadores: [
          { codigo:'P57b1', texto:'Se siente deprimido/a frecuentemente',        unidad:'%', polaridad:-1 },
          { codigo:'P57b2', texto:'Se siente feliz frecuentemente',               unidad:'%', polaridad:1 },
          { codigo:'P57b3', texto:'Se siente solo/a frecuentemente',              unidad:'%', polaridad:-1 },
          { codigo:'P57b4', texto:'Disfruta de la vida frecuentemente',           unidad:'%', polaridad:1 },
          { codigo:'P57b5', texto:'Se siente con energía frecuentemente',         unidad:'%', polaridad:1 },
          { codigo:'P57b6', texto:'Se siente tranquilo/a y relajado/a frecuentemente', unidad:'%', polaridad:1 }
        ]
      },
      {
        nombre: 'Situación económica (declarada)',
        nota: 'Indicador de privación económica subjetiva.',
        indicadores: [

  }
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getColor(valor, refAnd, polaridad) {
  if (isNaN(valor) || isNaN(refAnd) || polaridad === 0) return 'neutro';
  const diff = (valor - refAnd) / Math.max(Math.abs(refAnd), 1);
  const umbral = 0.05;
  if (polaridad === 1)  return diff > umbral ? 'verde' : diff < -umbral ? 'rojo' : 'neutro';
  if (polaridad === -1) return diff < -umbral ? 'verde' : diff > umbral  ? 'rojo' : 'neutro';
  return 'neutro';
}

function formatVal(v, unidad) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (Math.round(v * 10) / 10) + ' ' + unidad;
}

function renderBar(valor, refAnd, polaridad, unidad) {
  if (isNaN(valor) || isNaN(refAnd)) return '';
  const maxVal = Math.max(valor, refAnd) * 1.2 || 100;
  const pAnd = Math.min(refAnd / maxVal * 100, 100);
  const pMun = Math.min(valor / maxVal * 100, 100);
  const color = getColor(valor, refAnd, polaridad);
  return `<div class="bar-container">
    <div class="bar-and" style="width:${pAnd.toFixed(1)}%"></div>
    <div class="bar-mun ${color}" style="left:calc(${pMun.toFixed(1)}% - 1.5px)"></div>
  </div>`;
}

function countLoaded(valores) {
  return Object.keys(valores).filter(k => valores[k] !== null && !isNaN(valores[k])).length;
}

function getSignals(valores, referencias, limit) {
  const signals = [];
  AREAS.forEach(area => {
    area.grupos.forEach(g => {
      g.indicadores.forEach(ind => {
        const v = parseFloat(valores[ind.codigo]);
        const ref = referencias[ind.codigo];
        if (!ref) return;
        const refAnd = parseFloat(ref.refAndalucia);
        if (isNaN(v) || isNaN(refAnd) || ind.polaridad === 0) return;
        const diff = (v - refAnd) / Math.max(Math.abs(refAnd), 1);
        const signed = ind.polaridad === -1 ? diff : -diff; // signed > 0 means peor
        if (Math.abs(diff) > 0.05) {
          const pq = EAS_PREGUNTAS[ind.codigo];
          signals.push({
            codigo: ind.codigo,
            texto: pq ? pq.q : ind.texto,
            valor: v, refAnd, unidad: ind.unidad,
            diff, signed, color: getColor(v, refAnd, ind.polaridad),
            area: area.nombre.split(' ').slice(0,4).join(' ')
          });
        }
      });
    });
  });
  signals.sort((a,b) => Math.abs(b.signed) - Math.abs(a.signed));
  return signals.slice(0, limit || 10);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderIndicador(ind, valores, referencias) {
  const v = parseFloat(valores[ind.codigo]);
  const ref = referencias[ind.codigo] || {};
  const refAnd = parseFloat(ref.refAndalucia);
  const refGra = parseFloat(ref.refGranada);
  const color  = getColor(v, refAnd, ind.polaridad);
  const pq     = EAS_PREGUNTAS[ind.codigo] || {};

  let valHtml;
  if (isNaN(v)) {
    valHtml = `<span class="ind-val-sin">Sin dato</span>`;
  } else {
    valHtml = `<span class="ind-val-mun ${color}">${formatVal(v, ind.unidad)}</span>`;
    if (!isNaN(refAnd)) valHtml += ` <span class="ind-val-ref">And: ${formatVal(refAnd, ind.unidad)}</span>`;
    if (!isNaN(refGra)) valHtml += ` <span class="ind-val-ref">Gra: ${formatVal(refGra, ind.unidad)}</span>`;
  }

  return `<div class="ind-row">
    <div class="ind-left">
      <div class="ind-code">${ind.codigo}</div>
      <div class="ind-pregunta">${pq.q || ind.texto}</div>
      <div class="ind-tipo">${TIPO_LABELS[pq.tipo] || ''}</div>
    </div>
    <div class="ind-right">
      <div class="ind-valores">${valHtml}</div>
      ${renderBar(v, refAnd, ind.polaridad, ind.unidad)}
    </div>
  </div>`;
}

function renderArea(area, valores, referencias) {
  let html = `<div class="area-block">
    <div class="area-header" onclick="toggleArea('${area.id}')">
      <h2>${area.icono} ${area.nombre}</h2>
      <span class="area-toggle" id="toggle-${area.id}">▼</span>
    </div>
    <div class="area-content" id="content-${area.id}">
      <div style="padding:0.6rem 1.25rem 0.4rem; background:#f0f9ff; border-bottom:1px solid #e0f2fe; font-size:0.73rem; color:#0369a1;">
        ℹ️ ${area.nota}
      </div>`;
  area.grupos.forEach(g => {
    if (g.nombre) {
      html += `<div class="grupo-header">${g.nombre}</div>`;
      if (g.nota) html += `<div class="grupo-nota">⚠️ ${g.nota}</div>`;
    }
    g.indicadores.forEach(ind => {
      html += renderIndicador(ind, valores, referencias);
    });
  });
  html += `</div></div>`;
  return html;
}

function toggleArea(id) {
  const el = document.getElementById('content-' + id);
  const tog = document.getElementById('toggle-' + id);
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  if (tog) tog.textContent = hidden ? '▼' : '▶';
}

function renderApp(data) {
  const { valores, referencias, municipioNombre, municipio, timestamp } = data;
  const total = 55;
  const loaded = countLoaded(valores);
  const signals = getSignals(valores, referencias, 8);
  const peores = signals.filter(s => s.color === 'rojo');
  const mejores = signals.filter(s => s.color === 'verde');

  const fechaStr = timestamp ? new Date(timestamp).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

  let html = `
    <div class="header">
      <div class="header-top">
        <div>
          <h1>📊 Monitor EAS — Encuesta Andaluza de Salud</h1>
          <div class="sub">Municipio: <strong>${municipioNombre || municipio || '—'}</strong></div>
          <div class="badge-header">EAS 2023 · Estimación Bettersurveys</div>
        </div>
        <div class="header-meta">
          <div>${fechaStr}</div>
          <div style="margin-top:0.3rem">${loaded}/${total} indicadores cargados</div>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="label">Indicadores cargados</div>
          <div class="value">${loaded}<span style="font-size:1rem;color:var(--gris)">/${total}</span></div>
          <div class="desc">${Math.round(loaded/total*100)}% de los indicadores EAS</div>
        </div>
        <div class="summary-card">
          <div class="label">Señales detectadas</div>
          <div class="value ${signals.length > 0 ? 'ambar' : 'verde'}">${signals.length}</div>
          <div class="desc">Indicadores con desviación >5% de Andalucía</div>
        </div>
        <div class="summary-card">
          <div class="label">Por mejorar (peor que And.)</div>
          <div class="value ${peores.length > 0 ? 'rojo' : 'verde'}">${peores.length}</div>
          <div class="desc">Indicadores en rojo</div>
        </div>
        <div class="summary-card">
          <div class="label">Por encima (mejor que And.)</div>
          <div class="value verde">${mejores.length}</div>
          <div class="desc">Indicadores en verde</div>
        </div>
      </div>`;

  if (signals.length > 0) {
    html += `<div class="signals-card"><h3>⚡ Señales más destacadas (desviación respecto a Andalucía)</h3>`;
    signals.forEach(s => {
      const label = s.color === 'rojo' ? 'Peor' : 'Mejor';
      const diffPct = Math.abs(Math.round(s.diff * 1000) / 10);
      html += `<div class="signal-row">
        <span class="signal-badge ${s.color === 'rojo' ? 'peor' : 'mejor'}">${label}</span>
        <span class="signal-text">${s.texto}</span>
        <span class="signal-vals">${formatVal(s.valor, s.unidad)} vs And. ${formatVal(s.refAnd, s.unidad)} · ${diffPct}%</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="nota-card">
    ℹ️ <strong>Fuente:</strong> Estimaciones municipales Bettersurveys a partir de la Encuesta Andaluza de Salud (EAS) 2023.
    Todos los indicadores son de <strong>autorreporte</strong> obtenidos mediante entrevista CAPI.
    Las barras muestran el municipio (marcador vertical) frente a la referencia Andalucía (barra gris).
    <strong>Verde</strong> = mejor que Andalucía · <strong>Rojo</strong> = peor que Andalucía · <strong>Gris</strong> = sin referencia/neutral.
  </div>`;

  AREAS.forEach(area => {
    html += renderArea(area, valores, referencias);
  });

  html += `<div style="text-align:center; margin-top:1.5rem; color:var(--gris); font-size:0.75rem;">
    Monitor EAS — COMPÁS · Datos exportados desde TAB 2 el ${fechaStr}
    <br>Fuente primaria: Encuesta Andaluza de Salud 2023 — Consejería de Salud y Consumo, Junta de Andalucía
  </div></div>`;

  document.getElementById('app').innerHTML = html;
}

function renderNoData() {
  document.getElementById('app').innerHTML = `
    <div class="header"><h1>📊 Monitor EAS — COMPÁS</h1></div>
    <div class="container">
      <div class="no-data">
        <h2>Sin datos disponibles</h2>
        <p>No se encontraron datos de la EAS para mostrar en este monitor.<br>
        Accede desde COMPÁS → TAB 2 → Acordeón "05 Determinantes" → botón "📊 Abrir monitor EAS".</p>
        <button class="btn-volver" onclick="window.close()">Cerrar ventana</button>
      </div>
    </div>`;
}

// ─── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  var raw = null;
  try { raw = localStorage.getItem('compas_monitor_eas'); } catch(e) {}
  if (!raw) { renderNoData(); return; }
  var data = null;
  try { data = JSON.parse(raw); } catch(e) {}
  if (!data || !data.valores) { renderNoData(); return; }
  renderApp(data);
})();
</script>
